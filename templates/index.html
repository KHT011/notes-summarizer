<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Notes + Summary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>AI Notes Summary</h1>
      <form method="POST" action="/process" class="card">
        <label for="text">Input Text</label>
        <textarea id="text" name="text" rows="12" placeholder="Paste your notes here..."></textarea>

        <label for="llm_provider">LLM Provider</label>
        <select id="llm_provider" name="llm_provider">
          <option value="mistral" {% if default_llm_provider == 'mistral' %}selected{% endif %}>Mistral</option>
          <option value="ollama" {% if default_llm_provider == 'ollama' %}selected{% endif %}>Ollama (Llama 3.2)</option>
          <option value="openai" {% if default_llm_provider == 'openai' %}selected{% endif %}>OpenAI</option>
        </select>

        <label for="summary_mode">Summary Mode</label>
        <select id="summary_mode" name="summary_mode">
          <option value="short">Short</option>
          <option value="detailed">Detailed</option>
          <option value="bullet">Bullet</option>
        </select>

        <button type="submit">Process</button>
      </form>
    </main>
  </body>
</html>
